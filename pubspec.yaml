name: dartantic_gemma
description: Dartantic provider plugin enabling local LLM inference using Google's Gemma models via Flutter
version: 0.1.0
homepage: https://github.com/BoundlessNotions/dartantic_gemma
repository: https://github.com/BoundlessNotions/dartantic_gemma
license: BSD-3-Clause
publish_to: https://pub.dev

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  dartantic_interface: ^4.0.0
  flutter_gemma: ^0.13.2
  genai_primitives: ^0.2.0
  json_schema_builder: ^0.1.0
  logging: ^1.3.0
  meta: ^1.17.0
  mime: ^2.0.0
  uuid: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
